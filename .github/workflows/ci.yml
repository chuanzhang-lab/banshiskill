name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

permissions:
  contents: read
  checks: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install ruff
        run: pip install ruff

      - name: Run ruff linter (strict)
        run: ruff check . --output-format=github

      - name: Run ruff formatter check
        run: ruff format --check .

  typecheck:
    name: Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install mypy
        run: pip install mypy types-python-dateutil

      - name: Run mypy
        run: |
          mypy parse_skill.py skill_compressor.py compress.py --ignore-missing-imports

  test:
    name: Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-cov

      - name: Run tests with coverage
        run: |
          python -m pytest test_compress.py -v --tb=short --cov=. --cov-report=term-missing --cov-report=xml

      - name: Coverage gate (>=80%)
        run: |
          coverage report --fail-under=80

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage-${{ github.sha }}
          path: coverage.xml

  build-artifacts:
    name: Build Artifacts
    runs-on: ubuntu-latest
    needs: [lint, typecheck, test]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Generate skill_tree.json
        run: python3 parse_skill.py

      - name: Generate skill_compressed.xml
        run: python3 skill_compressor.py

      - name: Validate XML
        run: |
          python3 -c "
          import xml.etree.ElementTree as ET
          tree = ET.parse('skill_compressed.xml')
          root = tree.getroot()
          assert root.tag == 'skill', 'root must be <skill>'
          assert root.find('context_hierarchy') is not None, 'missing hierarchy'
          assert root.find('constraints') is not None, 'missing constraints'
          assert root.find('execution_flow') is not None, 'missing execution_flow'
          print('XML validation: PASS')
          "

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: skill-artifacts-${{ github.sha }}
          path: |
            skill_tree.json
            skill_compressed.xml
          retention-days: 30

  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: build-artifacts
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    environment: production
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: skill-artifacts-${{ github.sha }}
          path: .

      - name: Verify artifacts
        run: |
          test -f skill_tree.json || (echo "ERROR: skill_tree.json missing" && exit 1)
          test -f skill_compressed.xml || (echo "ERROR: skill_compressed.xml missing" && exit 1)
          echo "Artifacts verified: skill_tree.json + skill_compressed.xml"

      - name: Commit updated artifacts
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add skill_tree.json skill_compressed.xml
          git diff --staged --quiet || git commit -m "ci: auto-update skill artifacts [skip ci]"
          git push
