repos:
  - repo: local
    hooks:
      - id: test
        name: Run Tests
        entry: python -m pytest test_compress.py -v
        language: system
        pass_filenames: false
        always_run: true

      - id: lint
        name: Lint Code
        entry: ruff check .
        language: system
        pass_filenames: false
        always_run: true

      - id: format
        name: Format Code
        entry: ruff format .
        language: system
        pass_filenames: false
        always_run: true
        stages: [pre-commit]

      - id: skill-generate
        name: Generate Skill Artifacts
        entry: bash -c 'python3 parse_skill.py && python3 skill_compressor.py'
        language: system
        pass_filenames: false
        always_run: true
        stages: [pre-commit]
